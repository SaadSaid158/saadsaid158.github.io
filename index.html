<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🚧 Work in Progress | saadsaid158</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
      font-family: 'Courier New', Courier, monospace;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #ffffff;
      overflow: hidden;
    }

    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 50px;
      text-align: center;
      box-shadow: 0 0 30px rgba(0, 255, 150, 0.08);
      max-width: 90%;
    }

    .typewriter {
      display: inline-block;
      overflow: hidden;
      border-right: 2px solid #0ff;
      white-space: nowrap;
      animation: typing 3.2s steps(40, end), blink 0.8s step-end infinite;
      font-size: 2rem;
      color: #0ff;
      margin-bottom: 1.5rem;
    }

    p {
      font-size: 1.1rem;
      color: #ccc;
    }

    strong {
      color: #f39c12;
    }

    @keyframes typing {
      from { width: 0 }
      to { width: 100% }
    }

    @keyframes blink {
      0%, 100% { border-color: #0ff; }
      50% { border-color: transparent; }
    }
  </style>
</head>
<body>
  <div class="glass">
    <div class="typewriter">🚧 Deploying... Please stand by 🚧</div>
    <p>This site is under <strong>active red team surveillance</strong>.<br>
    Saad is currently <em>patching exploits</em> and <em>fortifying HTML firewalls</em>.<br>
    Come back once the perimeter is secure.</p>
  </div>
</body>
</html>
