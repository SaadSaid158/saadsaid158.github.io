  <!-- Decorative corner element -->
  <circle cx="1100" cy="130" r="180" fill="#3b5bdb" fill-opacity="0.04" />
  <circle cx="1100" cy="130" r="120" fill="#3b5bdb" fill-opacity="0.04" />
